name: CI/CD Pipeline 
  
on: 
  push: 
    branches: [ main ] 
  pull_request: 
    branches: [ main ] 
  
jobs: 
  build-test-scan-and-publish: 
    runs-on: ubuntu-latest 
  
    steps: 
      # 1) Get the source code from the repo 
      - name: Checkout repository 
        uses: actions/checkout@v4 
        with: 
          fetch-depth: 0   # Sonar needs full history 
  
      # 2) Install Java 17 
      - name: Set up JDK 17 
        uses: actions/setup-java@v4 
        with: 
          distribution: 'temurin' 
          java-version: '17' 
          cache: 'maven' 
  
      # 3) Compile + run all JUnit tests 
      - name: Build and test with Maven 
        run: mvn --batch-mode clean verify 
  
      # 4) Run SonarQube Cloud analysis 
      - name: SonarQube Cloud scan 
        env: 
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 
        run: mvn --batch-mode sonar:sonar 
  
      # 5) Log in to Docker Hub (only on push to main) 
      - name: Log in to Docker Hub 
        if: github.event_name == 'push' 
        uses: docker/login-action@v3 
        with: 
          username: ${{ secrets.DOCKERHUB_USERNAME }} 
          password: ${{ secrets.DOCKERHUB_TOKEN }} 
  
      # 6) Build the Docker image and push it to Docker Hub 
      - name: Build and push Docker image 
        if: github.event_name == 'push' 
        uses: docker/build-push-action@v5 
        with: 
          context: . 
          push: true 
          tags: | 
            ${{ secrets.DOCKERHUB_USERNAME }}/student-grade-api:latest 
            ${{ secrets.DOCKERHUB_USERNAME }}/student-grade-api:${{ github.sha }} 